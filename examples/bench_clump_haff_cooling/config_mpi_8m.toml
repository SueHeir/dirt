# Haff's Cooling with Multisphere Clumps — 8M steps, 2x2x1 MPI

[comm]
processors_x = 2
processors_y = 2
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.04
y_low = 0.0
y_high = 0.04
z_low = 0.0
z_high = 0.04
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.1
bin_size = 0.004

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "glass"
youngs_mod = 5.0e7
poisson_ratio = 0.3
restitution = 0.9
friction = 0.3

[[clump.definitions]]
name = "sphere7"
spheres = [
    { offset = [ 0.0,    0.0,    0.0   ], radius = 0.0005 },
    { offset = [ 0.0006, 0.0,    0.0   ], radius = 0.0005 },
    { offset = [-0.0006, 0.0,    0.0   ], radius = 0.0005 },
    { offset = [ 0.0,    0.0006, 0.0   ], radius = 0.0005 },
    { offset = [ 0.0,   -0.0006, 0.0   ], radius = 0.0005 },
    { offset = [ 0.0,    0.0,    0.0006], radius = 0.0005 },
    { offset = [ 0.0,    0.0,   -0.0006], radius = 0.0005 },
]

[[clump.insert]]
definition = "sphere7"
count = 200
density = 2500.0
material = "glass"
velocity = 0.5
region = { type = "block", min = [0.002, 0.002, 0.002], max = [0.038, 0.038, 0.038] }

[output]
dir = "examples/bench_clump_haff_cooling/data_mpi_8m"

[vtp]
interval = 100000

[run]
steps = 8000000
thermo = 50000
