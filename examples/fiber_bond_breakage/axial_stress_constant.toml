# ── Fiber bond breakage: AxialStress + Constant threshold ────────────────────
# Identical pull to `axial_elastic.toml`, with a stress-based break criterion
# added: the bond carrying tensile stress `|F_n|/A > σ_max` is removed.
#
# Predicted break event for a uniformly-strained chain pulled at constant
# tip velocity:
#   σ(t) = E · ε(t),   ε(t) = v·t / L₀,
#   σ_max = E · ε_break  →  ε_break = σ_max / E  =  5.0e6 / 1.0e9 = 0.005
#   t_break = ε_break · L₀ / v  =  0.005 · 0.020 / 0.10  =  1.0 ms
#
# All bonds share the same Constant threshold, so the FIRST bond to break is
# floating-point timing only — typically one of the middle bonds breaks first,
# the chain disconnects, and the rest stay intact (bond_count drops from 10
# to a smaller number; not necessarily to 1).
#
# Run:
#   cargo run --release --example fiber_bond --no-default-features -- \
#       examples/fiber_bond_breakage/axial_stress_constant.toml
#
# Validate:
#   python3 examples/fiber_bond_breakage/validate.py \
#       examples/fiber_bond_breakage/axial_stress_constant/data/fiber_bond.csv

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low  = -0.005
x_high =  0.025
y_low  = -0.005
y_high =  0.005
z_low  = -0.005
z_high =  0.005
boundary_x = "fixed"
boundary_y = "fixed"
boundary_z = "fixed"

[neighbor]
skin_fraction = 1.1
bin_size = 0.005
every = 1

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "bpm"
youngs_mod = 1.0e9
poisson_ratio = 0.25
restitution = 0.9
friction = 0.0

[[particles.insert]]
source = "file"
file = "examples/fiber_bond_breakage/fiber_11.csv"
format = "csv"
material = "bpm"
radius = 0.001
density = 2500.0
columns = { x = 0, y = 1, z = 2 }

[bonds]
auto_bond = true
bond_tolerance = 1.001
bond_radius_ratio = 1.0
youngs_modulus = 1.0e9
shear_modulus  = 4.0e8
beta_normal  = 1.0
beta_shear   = 1.0
beta_twist   = 1.0
beta_bending = 1.0

# ── Breakage criterion ──────────────────────────────────────────────────────
[bonds.breakage]
kind    = "axial_stress"
tensile = { kind = "constant", value = 5.0e6 }

[[group]]
name = "left_end"
region = { type = "block", min = [-5e-4, -5e-4, -5e-4], max = [5e-4, 5e-4, 5e-4] }
dynamic = false

[[group]]
name = "right_end"
region = { type = "block", min = [0.0195, -5e-4, -5e-4], max = [0.0205, 5e-4, 5e-4] }
dynamic = false

[[freeze]]
group = "left_end"

[[move_linear]]
group = "right_end"
vx = 0.1

[output]
dir = "examples/fiber_bond_breakage/axial_stress_constant"

[run]
# 20 000 steps · dt = 1e-7 = 2 ms — well past the predicted 1-ms break.
steps = 20000
thermo = 1000
dt = 1e-7
