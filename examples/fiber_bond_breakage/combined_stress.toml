# ── Fiber bond breakage: CombinedStress (Guo Eq. 16 / Potyondy-Cundall) ──
# Spaced 11-sphere fiber pinned at one end. Tip is driven downward at
# constant velocity by `[[move_linear]] vz`. As the cantilever bends, the
# anchor bond carries the largest bending moment `M_anchor = F · L_c` where
# F is the constraint force.
#
# CombinedStress criterion (Guo 2018 Eq. 16):
#     σ_combined = |F_n|/A + r_b · |M_bend|/I > σ_max
#
# Pure transverse pull at the tip gives F_n ≈ 0 along the fiber, so the
# anchor bond breaks when r_b · |M_bend|/I exceeds σ_max. From small-def
# beam theory `F = 3·E·I·y_tip / L_c³`, so
#     σ_anchor_bend = 3·E·r_b·y_tip / L_c²
# and the predicted break tip displacement is
#     y_break = σ_max · L_c² / (3·E·r_b)
#
# With σ_max = 5 MPa, E = 1 GPa, r_b = 1 mm, L_c = 40 mm:
#     y_break ≈ 2.67 mm
#
# Run:
#   cargo run --release --example fiber_bond --no-default-features -- \
#       examples/fiber_bond_breakage/combined_stress.toml
#
# Validate:
#   python3 examples/fiber_bond_breakage/validate.py \
#       examples/fiber_bond_breakage/combined_stress/data/fiber_bond.csv

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low  = -0.005
x_high =  0.045
y_low  = -0.005
y_high =  0.005
z_low  = -0.015
z_high =  0.005
boundary_x = "fixed"
boundary_y = "fixed"
boundary_z = "fixed"

[neighbor]
skin_fraction = 1.1
bin_size = 0.008
every = 1

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "bpm"
youngs_mod = 1.0e9
poisson_ratio = 0.25
restitution = 0.9
friction = 0.0

[[particles.insert]]
source = "file"
file = "examples/fiber_bond_breakage/fiber_11_spaced.csv"
format = "csv"
material = "bpm"
radius = 0.001
density = 2500.0
columns = { x = 0, y = 1, z = 2 }

[bonds]
auto_bond = true
bond_tolerance = 2.1
bond_radius_ratio = 1.0
youngs_modulus = 1.0e9
shear_modulus  = 4.0e8
beta_normal  = 1.0
beta_shear   = 1.0
beta_twist   = 1.0
beta_bending = 1.0

[bonds.breakage]
kind    = "combined_stress"
tensile = { kind = "constant", value = 5.0e6 }

[[group]]
name = "anchor"
region = { type = "block", min = [-5e-4, -5e-4, -5e-4], max = [5e-4, 5e-4, 5e-4] }
dynamic = false

[[group]]
name = "tip"
region = { type = "block", min = [0.0395, -5e-4, -5e-4], max = [0.0405, 5e-4, 5e-4] }
dynamic = false

[[freeze]]
group = "anchor"

# Heavy viscous damping so the chain follows quasi-static deflection.
[[viscous]]
group = "all"
gamma = 0.1

# Drive the tip downward at 0.5 m/s. Reach y_break ≈ 2.67 mm at t ≈ 5.3 ms;
# run 10 ms for headroom.
[[move_linear]]
group = "tip"
vz = -0.5

[output]
dir = "examples/fiber_bond_breakage/combined_stress"

[run]
steps = 100000
thermo = 5000
dt = 1e-7
