# ── Mesh-dependent softening localization: 20-bond fiber (~286 μm) ──────────
# Same per-bond constitutive law and pull rate as `localization_1mm.toml` and
# `localization_10mm.toml` — only the fiber length / bond count differs. The
# four configs (N = 20, 70, 200, 700) form a length sweep for the mesh-
# dependent softening pathology.
#
# Run:
#   cargo run --release --example fiber_bond --no-default-features -- \
#       examples/fiber_bond_breakage/localization_20bonds.toml

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low  = -0.0005
x_high =  0.0008
y_low  = -0.0001
y_high =  0.0001
z_low  = -0.0001
z_high =  0.0001
boundary_x = "fixed"
boundary_y = "fixed"
boundary_z = "fixed"

[neighbor]
skin_fraction = 1.1
bin_size = 5.0e-5
every = 1

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "bpm"
youngs_mod = 4.5e9
poisson_ratio = 0.406
restitution = 0.9
friction = 0.0

[[particles.insert]]
source = "file"
file = "examples/fiber_bond_breakage/fiber_21_20bonds.csv"
format = "csv"
material = "bpm"
radius = 7.143e-6
density = 1200.0
columns = { x = 0, y = 1, z = 2 }

[bonds]
auto_bond = true
bond_tolerance = 1.001
bond_radius_ratio = 1.0
youngs_modulus = 4.5e9
shear_modulus  = 1.6e9
beta_normal  = 0.001
beta_shear   = 0.001
beta_twist   = 0.001
beta_bending = 0.001

[bonds.plasticity.axial]
kind                = "piecewise"
breakpoint_strains  = [0.02, 0.04]
slope_multipliers   = [0.3,  0.0]

[bonds.breakage]
kind    = "axial_strain"
tensile = { kind = "constant", value = 0.06 }

# Grip width = max(2.5 % of fiber, 2 bonds) = 28.6 μm (2 beads each side).
[[group]]
name = "left_grip"
region = { type = "block", min = [-1.0e-5, -1.0e-4, -1.0e-4], max = [2.9e-5, 1.0e-4, 1.0e-4] }
dynamic = false

[[group]]
name = "right_grip"
region = { type = "block", min = [2.57e-4, -1.0e-4, -1.0e-4], max = [2.87e-4, 1.0e-4, 1.0e-4] }
dynamic = false

[[move_linear]]
group = "left_grip"
vx = -0.1

[[move_linear]]
group = "right_grip"
vx =  0.1

[output]
dir = "examples/fiber_bond_breakage/localization_20bonds"

[run]
# Time to ε_global = 0.07: 0.07 · L_fiber / (2·v_grip) = 100 μs → 20 000 steps.
steps  = 20000
thermo = 200
dt     = 5e-9
