# ── Fiber bond breakage: AxialStrain + Constant threshold ────────────────────
# Same pull as `axial_stress_constant.toml`, but the break criterion is the
# **strain-based** form `ε_axial > ε_max`. For the elastic regime these are
# equivalent under σ = E·ε, so the predicted break time is identical:
#
#   ε_break = 0.005,    t_break = ε_break · L₀ / v = 1.0 ms.
#
# This config exercises the `AxialStrain` criterion (Clemmer-Robbins PRL 2022
# / LAMMPS `bpm/spring` style) on the same fiber and pulling protocol as the
# stress test — the validator should see the same break time within
# numerical precision.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low  = -0.005
x_high =  0.025
y_low  = -0.005
y_high =  0.005
z_low  = -0.005
z_high =  0.005
boundary_x = "fixed"
boundary_y = "fixed"
boundary_z = "fixed"

[neighbor]
skin_fraction = 1.1
bin_size = 0.005
every = 1

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "bpm"
youngs_mod = 1.0e9
poisson_ratio = 0.25
restitution = 0.9
friction = 0.0

[[particles.insert]]
source = "file"
file = "examples/fiber_bond_breakage/fiber_11.csv"
format = "csv"
material = "bpm"
radius = 0.001
density = 2500.0
columns = { x = 0, y = 1, z = 2 }

[bonds]
auto_bond = true
bond_tolerance = 1.001
bond_radius_ratio = 1.0
youngs_modulus = 1.0e9
shear_modulus  = 4.0e8
beta_normal  = 1.0
beta_shear   = 1.0
beta_twist   = 1.0
beta_bending = 1.0

# ── Breakage criterion (strain-based) ───────────────────────────────────────
[bonds.breakage]
kind    = "axial_strain"
tensile = { kind = "constant", value = 0.005 }

[[group]]
name = "left_end"
region = { type = "block", min = [-5e-4, -5e-4, -5e-4], max = [5e-4, 5e-4, 5e-4] }
dynamic = false

[[group]]
name = "right_end"
region = { type = "block", min = [0.0195, -5e-4, -5e-4], max = [0.0205, 5e-4, 5e-4] }
dynamic = false

[[freeze]]
group = "left_end"

[[move_linear]]
group = "right_end"
vx = 0.1

[output]
dir = "examples/fiber_bond_breakage/axial_strain_constant"

[run]
steps = 20000
thermo = 1000
dt = 1e-7
