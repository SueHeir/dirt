# perf_mpi_scaling — single representative case (granular gas, 1 rank).
#
# A periodic cube of frictional glass spheres given a random velocity field and
# left to collide. No gravity, no walls: the neighbor-list rebuild and the
# Hertz contact kernel dominate the cost. This standalone config is the serial
# smoke test; the sweep driver generates the strong/weak multi-rank variants.
#
# Throughput is written to data/perf_results.csv (particle-steps per second).
#
# Run:
#   cargo build --release --example perf_mpi_scaling
#   mpiexec -n 1 target/release/examples/perf_mpi_scaling examples/perf_mpi_scaling/config.toml
#   # (or just: target/release/examples/perf_mpi_scaling examples/perf_mpi_scaling/config.toml)

[comm]
processors_x = 2
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.04
y_low = 0.0
y_high = 0.04
z_low = 0.0
z_high = 0.04
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.1
bin_size = 0.0032          # ~2 particle diameters
every = 1                 # rebuild cadence — fixed across all cases for fairness

# Gas scenario: gravity off (the bed scenario sets gz = -9.81 in its generated config).
[gravity]
gx = 0.0
gy = 0.0
gz = 0.0

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "glass"
youngs_mod = 5.0e7
poisson_ratio = 0.3
restitution = 0.9
friction = 0.3

[[particles.insert]]
material = "glass"
count = 2000
radius = 0.0008
density = 2500.0
velocity = 0.5            # Gaussian sigma per component (random initial field)
region = { type = "block", min = [0.002, 0.002, 0.002], max = [0.038, 0.038, 0.038] }

[output]
dir = "examples/perf_mpi_scaling"

[run]
steps = 2000
thermo = 5000
dt = 1.0e-6              # FIXED timestep — identical across every case for a fair comparison
