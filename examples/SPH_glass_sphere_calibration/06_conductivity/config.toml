# Granular-temperature conductivity κ(Φ) — gas-free vibro-fluidized bed.
#
# A bed of canonical glass beads under gravity rests on an oscillating base wall
# (periodic in x,z). The vibrating base injects granular-temperature energy at the
# bottom; it conducts upward and is dissipated inelastically + frictionally, giving
# steady Φ(y), T(y) profiles. sweep.py extracts the conductivity κ(Φ) from the
# conduction–dissipation balance κ(y) = q_y(y)/(−dT/dy). With friction (μ_p=0.16)
# the extra dissipation steepens the T(y) gradient enough to measure κ.
#
# Run:
#   cargo run --release --example sphcal_conductivity --no-default-features -- examples/SPH_glass_sphere_calibration/06_conductivity/config.toml

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
# Periodic in x (and z); the bed is bounded in y by the oscillating base and a
# high static top wall. Tall enough that the fluidized bed never reaches the top.
x_low = 0.0
x_high = 0.006
y_low = 0.0
y_high = 0.045      # tall column: lets a T(y) gradient develop over height
z_low = 0.0
z_high = 0.006
boundary_x = "periodic"
boundary_y = "fixed"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.2
bin_size = 0.0006
every = 1

[gravity]
gx = 0.0
gy = -9.81          # vertical = y
gz = 0.0

[dem]
contact_model = "hertz"

# Canonical glass-bead material.
[[dem.materials]]
name = "glass"
youngs_mod = 7.0e7
poisson_ratio = 0.245
restitution = 0.926
friction = 0.16     # μ_p — friction's extra dissipation steepens the T(y)
                    # gradient, making κ measurable (a frictionless near-elastic
                    # bed stays isothermal)
rolling_friction = 0.10  # μ_r — canonical glass-bead rolling friction (default "constant" model)
# canonical density 2500.0 is set on the particle insert below (DEM material
# schema carries no density field; density is a per-insert property)

[[particles.insert]]
material = "glass"
count = 3000        # deep bed (~18-layer settled) → tall fluidized column for a T(y) gradient
radius = { distribution = "uniform", min = 0.000225, max = 0.000275 }
density = 2500.0
# Insert LOOSE over most of the column so the bed settles gently (avoids the
# excessive-overlap abort from cramming a deep pile under strong vibration).
region = { type = "block", min = [0.0, 0.001, 0.0], max = [0.006, 0.040, 0.006] }
seed = 12345

# Oscillating base wall: injects fluctuation energy (the fluidization source).
[[wall]]
type = "plane"
point_y = 0.0
normal_y = 1.0
material = "glass"
name = "base"
# a(2πf)² ≈ 0.00025·(2π·160)² ≈ 253 m/s² → Γ_vib ≈ 26 (well fluidized, not violent).
oscillate = { amplitude = 0.00025, frequency = 160.0 }

# Static top wall (contains stragglers; the bed should not reach it).
[[wall]]
type = "plane"
point_y = 0.045
normal_y = -1.0
material = "glass"
name = "top"

[output]
dir = "examples/SPH_glass_sphere_calibration/06_conductivity/data"

[vtp]
interval = 200000

# Fluidize to steady state; profiles averaged over the steady window by sweep.py.
[[run]]
name = "fluidize"
steps = 4000000     # deep bed equilibrates slowly; smaller dt → more steps
thermo = 50000
dt = 1.0e-7         # safety against vibration-driven overlaps in the deep bed
