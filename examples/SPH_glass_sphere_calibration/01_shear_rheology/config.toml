# SPH glass-sphere calibration · 01 shear rheology — single representative case.
#
# A triperiodic box of glass beads (gravity off) is prepared by inserting a LOOSE
# pack (random insertion saturates near Φ≈0.38), compressing it to the target box
# (→ Φ ≈ 0.5), then shearing at constant rate γ̇ via the native Lees–Edwards
# triclinic deform style. The recorder streams the stress tensor, granular
# temperature, and solid fraction to data/sphcal_shear_rheology_results.csv.
#
# This is the FRICTIONAL/production path (glass μ_p = 0.16). sweep.py runs the
# (Φ, γ̇) grid, time-averages the steady window, and fits the μ(I)/Φ(I) closure
# (μ_s, μ_2, I_0, Φ_max, ρ_c = Φ_max·ρ_s) that the MUD SPH solver consumes.
#
# Run:
#   cargo run --release --example sphcal_shear_rheology --no-default-features -- examples/SPH_glass_sphere_calibration/01_shear_rheology/config.toml

[comm]
processors_x = 1
processors_y = 1   # decompose y and/or z for MPI; keep x = 1 (flow direction)
processors_z = 1

[domain]
# Loose insertion box (≈ Φ 0.30); compressed to 0.006 m (→ Φ ≈ 0.50) before shear.
# Fully periodic. Lees–Edwards shear: flow = x, gradient = y, vorticity = z.
x_low = 0.0
x_high = 0.00711
y_low = 0.0
y_high = 0.00711
z_low = 0.0
z_high = 0.00711
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.2
bin_size = 0.0006     # ~1.2 d
every = 1

[gravity]
gx = 0.0
gy = 0.0
gz = 0.0              # OFF for the homogeneous-shear rheometer

[dem]
contact_model = "hertz"

# Canonical glass-bead material.
[[dem.materials]]
name = "glass"
youngs_mod = 7.0e7    # softened from ~65 GPa real glass (rigid-grain limit)
poisson_ratio = 0.245 # glass
restitution = 0.926   # measured glass–glass COR
friction = 0.16       # measured glass–glass sliding μ_p (frictional production)
rolling_friction = 0.10  # μ_r — canonical glass-bead rolling friction (default "constant" model)
# density (ρ_s = 2500 kg/m³) is the canonical glass value; the DEM material schema
# carries it on the particle insert below, not in [[dem.materials]].

[[particles.insert]]
material = "glass"
count = 1634          # → Φ ≈ 0.50 in the compressed 0.006 m box
# Mild polydispersity, d ∈ [0.45, 0.55] mm about d = 0.5 mm (suppresses crystallization).
radius = { distribution = "uniform", min = 0.000225, max = 0.000275 }
density = 2500.0
velocity = 0.02       # small initial agitation to break the insertion lattice
region = { type = "block", min = [0.0, 0.0, 0.0], max = [0.00711, 0.00711, 0.00711] }
seed = 12345

[output]
dir = "examples/SPH_glass_sphere_calibration/01_shear_rheology/data"

[vtp]
interval = 100000

# Stage 1: relax the loose insertion (no deform).
[[run]]
name = "settle"
steps = 20000
thermo = 10000
dt = 2.0e-7

# Stage 2: compress the loose pack to the target box (→ Φ ≈ 0.50), atoms remapped.
# Velocity ramp: each box length 0.00711 → 0.006 over 60000 steps reaches the
# target deterministically at v = (0.006 − 0.00711)/(2e-7·60000) = -0.0925 m/s.
[[run]]
name = "compress"
steps = 60000
thermo = 10000
dt = 2.0e-7
deform = { x = { style = "vel", velocity = -0.0925 }, y = { style = "vel", velocity = -0.0925 }, z = { style = "vel", velocity = -0.0925 } }

# Stage 3: Lees–Edwards simple shear at γ̇ = 50 s⁻¹ (fixed target volume).
# strain γ = γ̇·t = 50 · (2e5 · 2e-7) = 2.0 (steady state reached).
[[run]]
name = "shear"
steps = 200000
thermo = 10000
dt = 2.0e-7
deform = { xy = { style = "erate", rate = 50.0 } }
