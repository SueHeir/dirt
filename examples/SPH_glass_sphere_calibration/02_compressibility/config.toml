# Isotropic compression — bulk modulus K(Φ) of glass beads — single representative case.
#
# A triperiodic box of glass beads (gravity off) is prepared by inserting a LOOSE
# pack, relaxing it, then compressed quasi-statically and ISOTROPICALLY: the
# [deform] vel driver pushes all three box faces inward at equal speed, so Φ rises
# while the pack stays homogeneous. The recorder streams pressure p and solid
# fraction Φ to data/compressibility_results.csv. sweep.py fits P(Φ) over the
# dense branch and extracts the bulk modulus K = dP/d(lnΦ).
#
# Run:
#   cargo run --release --example sphcal_compressibility --no-default-features -- \
#     examples/SPH_glass_sphere_calibration/02_compressibility/config.toml

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
# Loose insertion box (≈ Φ 0.30). Fully periodic; compressed isotropically below.
x_low = 0.0
x_high = 0.008
y_low = 0.0
y_high = 0.008
z_low = 0.0
z_high = 0.008
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.2
bin_size = 0.0006     # ~1.2 d
every = 1

[gravity]
gx = 0.0
gy = 0.0
gz = 0.0              # OFF: isotropic compression has no preferred direction

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "glass"
youngs_mod = 7.0e7    # softened from ~65 GPa real glass (rigid-grain limit)
poisson_ratio = 0.245 # glass
restitution = 0.926   # measured glass–glass COR (canonical glass-bead material)
friction = 0.16       # measured glass–glass sliding μ_p
rolling_friction = 0.10  # μ_r — canonical glass-bead rolling friction (default "constant" model)
# density (2500 kg/m³) is set on the particle insert below, per the config schema

[[particles.insert]]
material = "glass"
count = 2200          # → Φ ≈ 0.30 in the 0.008 m loose box; rises under compression
# Mild polydispersity, d ∈ [0.45, 0.55] mm about d = 0.5 mm (suppresses crystallization).
radius = { distribution = "uniform", min = 0.000225, max = 0.000275 }
density = 2500.0
velocity = 0.02       # small initial agitation to break the insertion lattice
region = { type = "block", min = [0.0, 0.0, 0.0], max = [0.008, 0.008, 0.008] }
seed = 12345

[output]
dir = "examples/SPH_glass_sphere_calibration/02_compressibility/data"

[vtp]
interval = 1000000

# Light viscous damping keeps the compression quasi-static (drains the work the
# moving box faces inject, so the pressure tracks the rate-independent EOS branch).
[[viscous]]
group = "all"
gamma = 1.0e-6

# Stage 1: relax the loose insertion (no deform), damped to remove insertion KE.
[[run]]
name = "settle"
steps = 20000
thermo = 2000
dt = 2.0e-7

# Stage 2: quasi-static ISOTROPIC compression. Each box length 0.008 → 0.0058 over
# 400000 steps reaches the dense branch (Φ ≈ 0.30 → ≈ 0.63). Equal inward face
# speed on all three axes: v = (0.0058 − 0.008)/(2e-7·400000) = -0.0275 m/s.
[[run]]
name = "compress"
steps = 400000
thermo = 2000
dt = 2.0e-7
deform = { x = { style = "vel", velocity = -0.0275 }, y = { style = "vel", velocity = -0.0275 }, z = { style = "vel", velocity = -0.0275 } }
