# sphcal_cooling_dissipation — granular-temperature dissipation closure.
# A freely cooling granular gas of glass beads in a periodic box. DIRT's contact
# has a velocity-independent restitution (constant e), so the gas obeys Haff's law
#   T(t) = T0 / (1 + t/tc)^2          (late-time log-log slope -2)
# The cooling time tc encodes the inelastic dissipation rate (the de-fluidization
# energy-balance closure). The sweep fits the Haff law and extracts tc.
#
# Single run:  cargo run --release --example sphcal_cooling_dissipation \
#   --no-default-features -- examples/SPH_glass_sphere_calibration/05_cooling_dissipation/config.toml

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.04
y_low = 0.0
y_high = 0.04
z_low = 0.0
z_high = 0.04
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.1
bin_size = 0.004

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "glass"
youngs_mod = 7.0e7    # softened glass-bead modulus (canonical calibration material)
poisson_ratio = 0.245 # glass
restitution = 0.926   # measured glass-glass COR
friction = 0.16       # measured glass-glass sliding mu_p
# density (2500 kg/m^3, canonical glass) is set on the particle insert below —
# DIRT's [[dem.materials]] schema carries contact properties, not density.
# rolling_friction intentionally omitted (= 0): keeps the contact to normal +
# tangential so the LAMMPS cross-check matches exactly. Sliding friction still
# makes the spheres rough, so rotational temperature builds up.

[[particles.insert]]
material = "glass"
count = 800                # smooth temperature statistics
radius = 0.0011
density = 2500.0
velocity = 0.5             # Gaussian sigma per component -> initial T_trans ~ 0.25
region = { type = "block", min = [0.002, 0.002, 0.002], max = [0.038, 0.038, 0.038] }

[output]
dir = "examples/SPH_glass_sphere_calibration/05_cooling_dissipation"

[run]
steps = 700000            # ~30 cooling times -> ~3 decades of decay above the noise floor
thermo = 10000
