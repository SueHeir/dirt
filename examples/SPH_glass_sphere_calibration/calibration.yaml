# =============================================================================
# DEM ‚Üí SPH calibration for the MUD de-fluidization model
# Material: canonical glass beads (ballotini), measured contact params.
#   e=0.926, őĹ=0.245, őľ_p=0.16, őľ_r=0.10 (constant rolling model), ŌĀ_s=2500,
#   ¬Ī10% uniform polydispersity. Assembled 2026-06-18 from the DEM closures in
#   examples/SPH_glass_sphere_calibration (one folder per closure).
#
# Consumed by mud_constitutive::MaterialParams (SPH_temp/crates/mud_constitutive).
# Provenance + confidence are noted per value. Weakly-constrained values flagged.
# =============================================================================

material: glass_beads_dem

# ---- mud_constitutive::MaterialParams fields ---------------------------------
params:
  # őľ(I) rheology. őľ_2 from the #1 inertial plateau (well-determined); őľ_s from
  # the macro (gentle-repose őł_r‚Čą21¬į‚Üítanőł‚Čą0.38, and #8's őľ(I) fit őľ_s=0.38) ‚ÄĒ
  # the #1 constant-volume sweep sampled only the inertial plateau (I‚ąą[0.26,0.97]
  # ‚Čę I_0) so it could not resolve őľ_s directly (őľ(I) was flat ‚Čą0.48 there).
  mu_s: 0.38          # macro-derived (repose + #8). [#1 plateau alone gave 0.48 flat]
  mu_2: 0.48          # #1 inertial-plateau friction (solid)
  i0:   0.05          # #1 fit ‚ÄĒ WEAKLY CONSTRAINED (no low-I data; treat as ~0.05‚Äď0.3)

  rho_s: 2500.0       # canonical glass
  rho_c: 1468.0       # #2 EOS jamming ő¶c=0.587 √ó ŌĀ_s  (cf. #1 ő¶_max=0.5685 ‚Üí 1421)

  # k_bulk/g_shear are the model's WEAK-COMPRESSIBILITY numerical choice (sound
  # speed c_s=50 m/s ‚Čą 10¬∑v_max, Mach‚Č≤0.1), NOT the stiff physical modulus ‚ÄĒ see
  # the DEM-measured EOS under `aux.compressibility` for the real stiffness.
  k_bulk: 3.67e6      # = ŌĀ_c ¬∑ c_s¬≤  (c_s = 50 m/s)
  g_shear: 2.25e6     # = 3(1‚ąí2őĹ)/(2(1+őĹ))¬∑K,  őĹ=0.245

  d: 0.0005           # reference grain diameter (rheometer, where őľ(I) measured)
  restitution: 0.926  # canonical glass COR (exact-COR damping; #5 Haff validates constant-e)

  coop_amplitude: 1.069  # #8 őĺ=A¬∑d/‚ąö(őľ‚ąíőľ_s). FLAG: R¬≤=0.34 (weak); lit. ‚Čą0.4‚Äď0.5.
                         # Consider 0.5 (Henann‚ÄďKamrin) or 0 (nonlocal off) if SPH-sensitive.

# ---- Auxiliary DEM closures (KT branch, EOS, dissipation, conduction) --------
# Not direct MaterialParams scalars, but the two-branch ŌÉ=ŌÉ_KT(T,ő¶)+ŌÉ_contact(ő¶)
# and the granular-T transport equation consume these.
aux:
  compressibility:                 # #2 ‚ÄĒ EOS P = A(ő¶‚ąíő¶c)^őĪ  (R¬≤=1.000, PASS)
    A: 1.241e7
    phi_c: 0.587
    alpha: 1.67
    K_of_phi_Pa: { 0.60: 6.725e5, 0.62: 1.311e6, 0.63: 1.592e6 }

  enduring_contact:                # #4 ‚ÄĒ ŌÉ_contact(ő¶)=p_DEM‚ąíp_KT(ő¶,T)  (PASS)
    file: 04_enduring_contact/data/sigma_contact.csv
    ratio_to_pDEM: { 0.286: 0.06, 0.569: 0.72 }   # dilute floor ‚Üí branch opens near jamming

  dissipation:                     # #5 ‚ÄĒ Haff cooling 1/‚ąöT = 1/‚ąöT0 + t/ŌĄ_H
    tau_H_s: 2.840e-2              # R¬≤=1.000 at e=0.926, production (frictional, ¬Ī10% poly)
    note: "KT dissipation őď ‚ąĚ (1‚ąíe¬≤)ŌĀ_s ő¶¬≤ g0 T^{3/2}; e=0.926 sets the rate."

  conductivity:                    # #6 ‚ÄĒ őļ*(ő¶) energy-balance (vibro-fluidized bed)
    kappa_star_range: [0.10, 1965.81]
    phi_range: [0.025, 0.571]
    file: 06_conductivity/data  # őļ(ő¶) profile

  cooperativity:                   # #8 ‚ÄĒ nonlocal (Zhang‚ÄďKamrin g=k‚ąöT)
    k_gT: 5984.69                  # R¬≤=0.992 (solid)
    coop_amplitude: 1.069          # R¬≤=0.34 (weak ‚ÄĒ see params.coop_amplitude flag)

  flow_arrest:
    phi_max: 0.5685                # #1 őľ(I) ő¶ where flow stops

# ---- Macro validation (not a closure input; the end-to-end gate) -------------
validation:
  column_collapse:                 # #7 ‚ÄĒ runout vs Lube/Lajeunesse (PASS, ~10‚Äď15%)
    mu_r_pinned: 0.10              # pinned here; polydispersity fixed most over-runout
    law: "(L_f‚ąíL0)/L0 ‚Čą 1.2a (a‚Č≤3), 1.6a^(2/3) (a‚Č≥3)"
  repose: "qualitative only ‚ÄĒ protocol-sensitive (9‚Äď35¬į); őł_r‚Čą21¬į at gentle settle ‚Üí őľ_s‚Čą0.38"
