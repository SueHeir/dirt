# Reduced-step LEBC config for CPU-vs-GPU contact-force TIMING only (not science).
# Identical physics to config.toml but far fewer steps; both DIRT_FORCE=cpu/gpu
# runs do identical work so the wall-clock ratio measures contact+neighbor cost.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.00711
y_low = 0.0
y_high = 0.00711
z_low = 0.0
z_high = 0.00711
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.2
bin_size = 0.0006
every = 1

[gravity]
gx = 0.0
gy = 0.0
gz = 0.0

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "glass"
youngs_mod = 7.0e7
poisson_ratio = 0.245
restitution = 0.926
friction = 0.16

[[particles.insert]]
material = "glass"
count = 1634
radius = { distribution = "uniform", min = 0.000225, max = 0.000275 }
density = 2500.0
velocity = 0.02
region = { type = "block", min = [0.0, 0.0, 0.0], max = [0.00711, 0.00711, 0.00711] }
seed = 12345

[output]
dir = "examples/bench_lebc_shear/data_timing"

[vtp]
interval = 100000000

# Stage 1: brief settle.
[[run]]
name = "settle"
steps = 2000
thermo = 100000
dt = 2.0e-7

# Stage 2: partial compress (denser pack → representative contact count).
[[run]]
name = "compress"
steps = 20000
thermo = 100000
dt = 2.0e-7
deform = { x = { style = "vel", velocity = -0.0925 }, y = { style = "vel", velocity = -0.0925 }, z = { style = "vel", velocity = -0.0925 } }

# Stage 3: Lees–Edwards simple shear — the representative steady-shear timing window.
[[run]]
name = "shear"
steps = 20000
thermo = 100000
dt = 2.0e-7
deform = { xy = { style = "erate", rate = 50.0 } }
