# Haff's Cooling — Single Rough Spheres
# A freely cooling granular gas of frictional spheres in a periodic box.
# Because DIRT's contact has a velocity-independent restitution (constant e),
# the gas obeys Haff's law:  T(t) = T0 / (1 + t/tc)^2   (late-time slope -2).
#
# Run via the driver:  python3 examples/bench_sphere_haff_cooling/run.py
# Single run:          cargo run --release --example bench_sphere_haff_cooling \
#                          --no-default-features -- examples/bench_sphere_haff_cooling/config.toml

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.04
y_low = 0.0
y_high = 0.04
z_low = 0.0
z_high = 0.04
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.1
bin_size = 0.004

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "glass"
youngs_mod = 7.0e7    # softened from ~65 GPa real glass (canonical glass-bead material)
poisson_ratio = 0.245 # glass
restitution = 0.926   # measured glass–glass COR
friction = 0.16       # measured glass–glass sliding μ_p
# rolling_friction intentionally omitted (= 0): keeps the contact to normal +
# tangential so the LAMMPS cross-check matches exactly. Sliding friction (0.3)
# still makes the spheres rough → rotational temperature builds up.

[[particles.insert]]
material = "glass"
count = 800                # bumped from 200 for smoother temperature statistics
radius = 0.0011
density = 2500.0
velocity = 0.5             # Gaussian sigma per component → initial T_trans ≈ 0.25
region = { type = "block", min = [0.002, 0.002, 0.002], max = [0.038, 0.038, 0.038] }

[output]
dir = "examples/bench_sphere_haff_cooling/data"

[run]
steps = 700000            # ~30 cooling times → ~3 decades of decay above the noise floor
thermo = 10000
