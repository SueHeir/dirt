# Haff's Cooling — Single Rough Spheres
# Matches clump benchmark: same box, material, count, velocity, restitution, friction.
# Sphere radius = 1.1mm (matching clump effective radius).

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.04
y_low = 0.0
y_high = 0.04
z_low = 0.0
z_high = 0.04
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.1
bin_size = 0.004

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "glass"
youngs_mod = 5.0e7
poisson_ratio = 0.3
restitution = 0.9
friction = 0.3
rolling_friction = 0.2

[[particles.insert]]
material = "glass"
count = 200
radius = 0.0011
density = 2500.0
velocity = 0.5
region = { type = "block", min = [0.002, 0.002, 0.002], max = [0.038, 0.038, 0.038] }

[output]
dir = "examples/bench_sphere_haff_cooling/data"

[vtp]
interval = 100000

[run]
steps = 2000000
thermo = 10000
